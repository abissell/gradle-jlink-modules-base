# https://docs.gradle.org/current/userguide/version_catalogs.html#sec::toml-dependencies-format

[versions]
com-abissell-javautil = "0.12.0"
com-google-code-gson-gson = "2.13.2"
commons-beanutils-commons-beanutils = "1.9.4"
commons-cli-commons-cli = "1.5.0"
org-apache-commons-commons-lang3 = "3.20.0"
org-junit-jupiter-junit-jupiter = "6.0.3"

[libraries]
com-abissell-javautil = { module = "com.abissell:javautil", version.ref = "com-abissell-javautil" }
com-google-code-gson-gson = { module = "com.google.code.gson:gson", version.ref = "com-google-code-gson-gson" }
commons-beanutils-commons-beanutils = { module = "commons-beanutils:commons-beanutils", version.ref = "commons-beanutils-commons-beanutils" }
commons-cli-commons-cli = { module = "commons-cli:commons-cli", version.ref = "commons-cli-commons-cli" }
org-apache-commons-commons-lang3 = { module = "org.apache.commons:commons-lang3", version.ref = "org-apache-commons-commons-lang3" }
org-junit-jupiter-junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "org-junit-jupiter-junit-jupiter" }
org-junit-platform-junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }
